name: E2E Test

on:
  workflow_dispatch: 
  workflow_call:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6 
        with:
          repository: my-org-38/gh-actions-e2e-tests
          ref: main
      - name: Setup Node
        id: setup
        uses: actions/setup-node@v6 
        with:
          node-version: '24.x'
      - name: Install deps
        id: node-deps
        run: npm ci
      - name: E2E Tests
        id: tests
        run: npm run test:e2e