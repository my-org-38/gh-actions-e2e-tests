name: E2E Test

on:
  workflow_dispatch: 
  workflow_call:
    secrets:
      APP_PRIVATE_KEY:
        required: true
    inputs:
      CLIENT_ID:
        required: true
        type: string

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3 
        with:
          client-id: ${{ inputs.CLIENT_ID || vars.CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      
      - name: Print Output token
        run: |
          echo "Token is: ${{ steps.app-token.outputs.token }}"
      - name: Print GH token
        run: |
          echo "GH Token is: ${{ secrets.GITHUB_TOKEN }}"
      - uses: actions/checkout@v6 
        with:
          repository: my-org-38/gh-actions-e2e-tests
          ref: main
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
      - name: Setup Node
        id: setup
        uses: actions/setup-node@v6 
        with:
          node-version: '24.x'
      - name: Install deps
        id: node-deps
        run: npm ci
      - name: E2E Tests
        id: tests
        run: npm run test:e2e